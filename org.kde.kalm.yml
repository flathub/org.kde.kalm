app-id: org.kde.kalm
runtime: org.kde.Platform
runtime-version: 6.10
sdk: org.kde.Sdk
command: kalm
copy-icon: true
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
cleanup:
  - /include
  - /lib/cmake
  - /lib/libexec
  - /mkspecs
  - /etc/xdg/*categories
  - /share/qlogging-categories5
modules:
  - name: kalm
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://download.kde.org/stable/release-service/26.04.0/src/kalm-26.04.0.tar.xz
        sha256: 238d62600b0daea43df5a80ee1fe92b93679045bb8c3a219619544b4902adc06
        x-checker-data:
          type: anitya
          project-id: 8763
          stable-only: true
          url-template: https://download.kde.org/stable/release-service/$version/src/kalm-$version.tar.xz
