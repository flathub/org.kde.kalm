app-id: org.kde.kalm
runtime: org.kde.Platform
runtime-version: 6.10
sdk: org.kde.Sdk
command: kalm
copy-icon: true
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
cleanup:
  - /include
  - /lib/cmake
  - /lib/libexec
  - /mkspecs
  - /etc/xdg/*categories
  - /share/qlogging-categories5
modules:
  - name: kalm
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://download.kde.org/stable/release-service/26.04.1/src/kalm-26.04.1.tar.xz
        sha256: 9727f8f3010b2b0c8e901beb04c188f7d1f836efea09607c74701b1d4c5e0b03
        x-checker-data:
          type: anitya
          project-id: 8763
          stable-only: true
          url-template: https://download.kde.org/stable/release-service/$version/src/kalm-$version.tar.xz
