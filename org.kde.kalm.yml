app-id: org.kde.kalm
runtime: org.kde.Platform
runtime-version: 6.10
sdk: org.kde.Sdk
command: kalm
copy-icon: true
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
cleanup:
  - /include
  - /lib/cmake
  - /lib/libexec
  - /mkspecs
  - /etc/xdg/*categories
  - /share/qlogging-categories5
modules:
  - name: kalm
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://download.kde.org/stable/release-service/26.04.3/src/kalm-26.04.3.tar.xz
        sha256: e91ab08e6bcab0562d4defa6db9fbbd747360699382f5ec12b936e3903f23d54
        x-checker-data:
          type: anitya
          project-id: 8763
          stable-only: true
          url-template: https://download.kde.org/stable/release-service/$version/src/kalm-$version.tar.xz
